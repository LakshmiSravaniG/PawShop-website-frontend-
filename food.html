<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">

        <h2 class="text-center mb-5">Dog Supplies</h2>

        <div class="row g-4">

            <!-- Product 1 -->

            <div class="col-md-4">

                <div class="card text-center">

                    <img src="https://m.media-amazon.com/images/I/71F9Lr1q2gL.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Dog Food</h5>

                        <p>₹899</p>

                        <button class="btn btn-warning add-cart">
                            <i class="fa fa-cart-shopping"></i> Add to Cart
                        </button>

                    </div>

                </div>

            </div>


            <!-- Product 2 -->

            <div class="col-md-4">

                <div class="card text-center">

                    <img src="https://m.media-amazon.com/images/I/61LtuGzXeaL.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Dog Toy</h5>

                        <p>₹299</p>

                        <button class="btn btn-warning add-cart">
                            <i class="fa fa-cart-shopping"></i> Add to Cart
                        </button>

                    </div>

                </div>

            </div>


            <!-- Product 3 -->

            <div class="col-md-4">

                <div class="card text-center">

                    <img src="https://m.media-amazon.com/images/I/61sZQvJrQJL.jpg" class="card-img-top">

                    <div class="card-body">

                        <h5>Dog Collar</h5>

                        <p>₹199</p>

                        <button class="btn btn-warning add-cart">
                            <i class="fa fa-cart-shopping"></i> Add to Cart
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>
    <script>

        let cart = 0;

        document.querySelectorAll(".add-cart").forEach(button => {

            button.addEventListener("click", function () {

                cart++;

                alert("Product added to cart 🛒");

            });

        });

    </script>
</body>

</html>
