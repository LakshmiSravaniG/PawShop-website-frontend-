<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PawShop Contact</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-light bg-primary sticky-top">

        <div class="container">

            <a class="navbar-brand text-white fw-bold" href="#">
                🐾 PawShop
            </a>

            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link text-white active" href="./index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="./categories.html">Categories</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="./products.html">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="./deals.html">Deals</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-white" href="./contact.html">Contact</a>
                    </li>

                </ul>

                <!-- Search -->

                <form class="d-flex me-3">

                    <input class="form-control me-2" type="search" placeholder="Search food, toys, treats">

                    <button class="btn btn-warning fw-bold">
                        Search
                    </button>

                </form>

                <!-- Country -->

                <div class="d-flex align-items-center me-3 text-white">

                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Flag_of_India.svg/960px-Flag_of_India.svg.png"
                        width="25" class="me-2">

                    <span>India</span>

                </div>

                <!-- Login + Cart -->

                <button class="btn btn-light me-2">
                    Login
                </button>

                <button class="btn btn-warning">
                    <i class="fa-solid fa-cart-shopping"></i> Cart
                </button>

            </div>

        </div>

    </nav>


    <section id="contact" class="py-5">

        <div class="container">

            <h2 class="text-center mb-5">Contact Us</h2>

            <div class="row g-4">

                <!-- Contact Form -->

                <div class="col-md-6">

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Enter your name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Send Message
                        </button>

                    </form>

                </div>

                <!-- Map -->

                <div class="col-md-6">

                    <iframe src="https://www.google.com/maps?q=Tenali&output=embed" width="100%" height="350"
                        style="border:0;" loading="lazy">
                    </iframe>

                </div>

            </div>

        </div>

    </section>

    <!-- Footer -->

    <footer id="footer">

        <div class="container">

            <div class="row text-center">

                <!-- Column 1 -->

                <div class="col-md-3">
                    <h5>PawShop</h5>
                    <p>Your one stop shop for pet food, toys and accessories.</p>
                </div>

                <!-- Column 2 -->

                <div class="col-md-3">
                    <h5>Quick Links</h5>
                    <a href="#home" class="text-white d-block">Home</a>
                    <a href="./products.html" class="text-white d-block">Products</a>
                    <a href="./deals.html" class="text-white d-block">Offers</a>
                </div>

                <!-- Column 3 -->

                <div class="col-md-3">
                    <h5>Support</h5>
                    <p>Help Center</p>
                    <p>Shipping</p>
                    <p>Returns</p>
                </div>

                <!-- Column 4 -->

                <div class="col-md-3">
                    <h5>Follow Us</h5>

                    <i class="fa-brands fa-facebook fa-lg"></i>
                    <i class="fa-brands fa-instagram fa-lg"></i>
                    <i class="fa-brands fa-twitter fa-lg"></i>
                    <i class="fa-brands fa-linkedin fa-lg"></i>
                    <i class="fa-brands fa-github fa-lg"></i>
                    <i class="fa-brands fa-vercel fa-lg"></i>

                </div>

            </div>

        </div>

    </footer>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
