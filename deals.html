<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Special Offers -->

    <section id="offers">

        <div class="container">

            <h2 class="text-center mb-5">Today's Deals</h2>

            <div class="row">

                <!-- Offer 1 -->

                <div class="col-md-4">
                    <div class="offer-box text-center">

                        <h4>Dog Food Offer</h4>
                        <p>Get 30% OFF on all premium dog food.</p>

                        <button class="btn btn-warning">
                            Shop Now
                        </button>

                    </div>
                </div>

                <!-- Offer 2 -->

                <div class="col-md-4">
                    <div class="offer-box text-center">

                        <h4>Pet Toys Sale</h4>
                        <p>Buy 1 Get 1 Free on selected toys.</p>

                        <button class="btn btn-warning">
                            Shop Now
                        </button>

                    </div>
                </div>

                <!-- Offer 3 -->

                <div class="col-md-4">
                    <div class="offer-box text-center">

                        <h4>Free Delivery</h4>
                        <p>Free delivery on orders above ₹999.</p>

                        <button class="btn btn-warning">
                            Shop Now
                        </button>

                    </div>
                </div>

            </div>

        </div>

    </section>
</body>

</html>
